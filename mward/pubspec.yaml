name: mward
description: mWard - Ward issue reporting app for Himachal Pradesh
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Framework
  cupertino_icons: ^1.0.6

  # AWS Amplify
  amplify_flutter: ^2.0.0
  amplify_auth_cognito: ^2.0.0
  amplify_api: ^2.0.0
  amplify_storage_s3: ^2.0.0
  amplify_analytics_pinpoint: ^2.0.0
  amplify_push_notifications_pinpoint: ^2.0.0
  amplify_datastore: ^2.0.0

  # State Management
  provider: ^6.1.1
  get: ^4.6.6

  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Image Handling
  image_picker: ^1.0.7
  # Temporarily disabled due to web compatibility issues
  # image_cropper: ^5.0.1
  cached_network_image: ^3.3.1
  photo_view: ^0.14.0

  # Location Services
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  location: ^5.0.3

  # Permissions
  permission_handler: ^11.1.0

  # Notifications
  flutter_local_notifications: ^16.3.0
  awesome_notifications: ^0.7.4+1

  # File & Document
  path_provider: ^2.1.2
  file_picker: ^6.1.1
  open_file: ^3.3.2

  # Date & Time
  intl: ^0.18.1
  timeago: ^3.6.0

  # Utilities
  uuid: ^4.3.3
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  connectivity_plus: ^6.1.5

  # Validation
  validators: ^3.0.0

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Icons
  flutter_svg: ^2.0.9
  font_awesome_flutter: ^10.6.0

  # Charts & Analytics
  fl_chart: ^0.66.0

  # Loading & Progress
  flutter_spinkit: ^5.2.0
  shimmer: ^3.0.0

  # Camera
  camera: ^0.10.5+7

  # Image Compression
  flutter_image_compress: ^2.1.0

  # Audio Recording
  record: ^5.1.0

  # Video Player
  video_player: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # Code Generation
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

  # Testing
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
        - asset: assets/fonts/NotoSansDevanagari-Bold.ttf
          weight: 700
